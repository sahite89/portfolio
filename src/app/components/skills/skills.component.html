<section id="skills" class="py-20 sm:py-32 relative bg-gray-900/30">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div appScrollReveal="fadeInUp" class="text-center mb-16">
      <h2 class="text-3xl sm:text-4xl font-bold mb-4">
        <span class="bg-gradient-to-r from-primary-400 to-accent-400 bg-clip-text text-transparent">
          {{ t().skills.title }}
        </span>
      </h2>
      <p class="text-gray-400">{{ t().skills.subtitle }}</p>
    </div>

    <div appScrollReveal="fadeInUp" [delay]="100" class="flex flex-wrap justify-center gap-3 mb-12">
      @for (cat of categories; track cat.key) {
        <button
          (click)="setCategory(cat.key)"
          class="px-5 py-2 text-sm font-medium rounded-full transition-all duration-300"
          [ngClass]="activeCategory === cat.key ? 'bg-primary-600 text-white shadow-lg shadow-primary-500/25' : 'bg-gray-800 text-gray-400 hover:text-gray-200 hover:bg-gray-700'"
        >
          {{ cat.label }}
        </button>
      }
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (skill of filteredSkills; track skill.name; let i = $index) {
        <div appScrollReveal="fadeInUp" [delay]="i * 80" class="bg-gray-800/50 rounded-xl p-6 border border-gray-800 hover:border-primary-500/30 transition-all duration-300 group">
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-white font-medium group-hover:text-primary-400 transition-colors">{{ skill.name }}</h3>
            <span class="text-sm font-mono text-primary-400">{{ skill.level }}%</span>
          </div>
          <div class="w-full bg-gray-900 rounded-full h-2 overflow-hidden">
            <div
              class="h-full bg-gradient-to-r from-primary-500 to-accent-500 rounded-full transition-all duration-1000 ease-out"
              [style.width.%]="skill.level"
            ></div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
