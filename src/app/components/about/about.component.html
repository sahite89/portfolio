<section id="about" class="py-20 sm:py-32 relative">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid md:grid-cols-2 gap-12 items-center">
      <div appScrollReveal="fadeInLeft" class="relative">
        <div class="w-64 h-64 sm:w-80 sm:h-80 mx-auto relative">
          <div class="absolute inset-0 bg-gradient-to-br from-primary-500 to-accent-500 rounded-2xl rotate-6 opacity-20"></div>
          <div class="absolute inset-0 bg-gradient-to-br from-primary-500 to-accent-500 rounded-2xl -rotate-3 opacity-40"></div>
          <div class="w-full h-full bg-gray-800 rounded-2xl overflow-hidden relative z-10 flex items-center justify-center">
            <svg class="w-32 h-32 text-gray-600" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
          </div>
        </div>
      </div>

      <div appScrollReveal="fadeInRight" [delay]="200">
        <h2 class="text-3xl sm:text-4xl font-bold mb-6">
          <span class="bg-gradient-to-r from-primary-400 to-accent-400 bg-clip-text text-transparent">
            {{ t().about.title }}
          </span>
        </h2>
        @for (paragraph of t().about.description; track $index) {
          <p class="text-gray-400 mb-4 leading-relaxed">{{ paragraph }}</p>
        }
        <button class="mt-6 px-6 py-3 bg-gray-800 hover:bg-gray-700 text-gray-200 font-medium rounded-full transition-all duration-300 border border-gray-700 hover:border-primary-500/50 flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          {{ t().about.downloadCv }}
        </button>
      </div>
    </div>
  </div>
</section>
